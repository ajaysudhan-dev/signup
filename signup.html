<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex justify-center items-center p-4">

<div class="bg-white w-full max-w-md p-6 rounded-xl shadow-lg">
    <h1 class="text-3xl font-bold text-center mb-6">Sign Up</h1>

    <form id="signupForm" class="space-y-4">

        <div>
            <input
                type="text"
                id="name"
                placeholder="Full Name"
                class="w-full border p-3 rounded"
            >
            <small id="nameError" class="text-red-500"></small>
        </div>

        <div>
            <input
                type="email"
                id="email"
                placeholder="Email"
                class="w-full border p-3 rounded"
            >
            <small id="emailError" class="text-red-500"></small>
        </div>

        <div>
            <input
                type="text"
                id="phone"
                placeholder="Phone Number"
                class="w-full border p-3 rounded"
            >
            <small id="phoneError" class="text-red-500"></small>
        </div>

        <div>
            <input
                type="text"
                id="city"
                placeholder="Location / City"
                class="w-full border p-3 rounded"
            >
            <small id="cityError" class="text-red-500"></small>
        </div>

        <div class="relative">
            <input
                type="password"
                id="password"
                placeholder="Password"
                class="w-full border p-3 rounded"
            >
            <button
                type="button"
                onclick="togglePassword('password')"
                class="absolute right-3 top-3"
            >
                👁
            </button>
            <small id="passwordError" class="text-red-500"></small>
        </div>

        <div class="relative">
            <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm Password"
                class="w-full border p-3 rounded"
            >
            <button
                type="button"
                onclick="togglePassword('confirmPassword')"
                class="absolute right-3 top-3"
            >
                👁
            </button>
            <small id="confirmError" class="text-red-500"></small>
        </div>

        <button
            class="w-full bg-blue-600 text-white py-3 rounded hover:bg-blue-700"
        >
            Sign Up
        </button>

        <p class="text-center">
            Already have an account?
            <a href="signin.html" class="text-blue-600">
                Sign In
            </a>
        </p>

    </form>
</div>

<script src="signup.js"></script>

</body>
</html>
